<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skeleton Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <svg height="0" width="0" style="position: absolute; visibility: hidden;">
        <defs>
            <linearGradient id="bone-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#fdfbf7;stop-opacity:1" />
                <stop offset="50%" style="stop-color:#e6e2d3;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#c4bba0;stop-opacity:1" />
            </linearGradient>
        </defs>
    </svg>
    <div id="game-timer">00:00</div>
    <div id="game-board">
        <div id="bone-yard">
            <div class="draggable-bone" id="bone-skull">
                <svg viewBox="15 5 70 75" class="bone-svg">
                    <path fill-rule="evenodd" d="M50 5 C30 5 15 25 15 45 C15 65 25 75 35 80 L65 80 C75 75 85 65 85 45 C85 25 70 5 50 5 Z M30 40 A8 8 0 1 0 30 56 A8 8 0 1 0 30 40 Z M70 40 A8 8 0 1 0 70 56 A8 8 0 1 0 70 40 Z M50 60 L45 70 H55 Z" />
                </svg>
            </div>
            <div class="draggable-bone" id="bone-jaw">
                <svg viewBox="35 80 30 19" class="bone-svg">
                    <path d="M35 80 C40 85 60 85 65 80 L65 95 C60 100 40 100 35 95 Z" />
                </svg>
            </div>
            <div class="draggable-bone" id="bone-left-clavicle">
                <svg viewBox="5 2 40 9" class="bone-svg">
                    <path d="M45 10 C30 5 15 15 5 10 C15 5 30 0 45 5 Z" />
                </svg>
            </div>
            <div class="draggable-bone" id="bone-right-clavicle">
                <svg viewBox="55 2 40 9" class="bone-svg">
                    <path d="M55 10 C70 5 85 15 95 10 C85 5 70 0 55 5 Z" />
                </svg>
            </div>
            <div class="draggable-bone" id="bone-ribcage">
                <svg viewBox="24 10 52 90" class="bone-svg">
                    <path d="M45 10 H55 V100 H45 Z M45 20 C20 15 15 35 45 40 V35 C20 30 25 20 45 25 Z M55 20 C80 15 85 35 55 40 V35 C80 30 75 20 55 25 Z M45 45 C20 40 15 60 45 65 V60 C20 55 25 45 45 50 Z M55 45 C80 40 85 60 55 65 V60 C80 55 75 45 55 50 Z M45 70 C20 65 15 85 45 90 V85 C20 80 25 70 45 75 Z M55 70 C80 65 85 85 55 90 V85 C80 80 75 70 55 75 Z" />
                </svg>
            </div>
            <div class="draggable-bone" id="bone-pelvis">
                <svg viewBox="6 10 87 65" class="bone-svg">
                    <path fill-rule="evenodd" d="M10 10 Q50 30 90 10 Q100 40 80 55 L65 75 L50 60 L35 75 L20 55 Q0 40 10 10 Z M25 45 A5 5 0 1 0 25 55 A5 5 0 1 0 25 45 Z M75 45 A5 5 0 1 0 75 55 A5 5 0 1 0 75 45 Z" />
                </svg>
            </div>
            <div class="draggable-bone" id="bone-left-arm">
                <svg viewBox="40 10 30 90" class="bone-svg">
                    <path d="M60 10 C70 10 75 20 65 30 L50 60 L50 100 L40 100 L40 60 L55 30 C45 20 50 10 60 10 Z" />
                </svg>
            </div>
            <div class="draggable-bone" id="bone-right-arm">
                <svg viewBox="29.5 10 30.5 90" class="bone-svg">
                    <path d="M40 10 C30 10 25 20 35 30 L50 60 L50 100 L60 100 L60 60 L45 30 C55 20 50 10 40 10 Z" />
                </svg>
            </div>
            <div class="draggable-bone" id="bone-left-thigh">
                <svg viewBox="38 10 24 90" class="bone-svg">
                    <path d="M50 10 C60 10 65 20 60 30 L50 80 L50 100 L40 100 L40 30 C35 20 40 10 50 10 Z" />
                </svg>
            </div>
            <div class="draggable-bone" id="bone-right-thigh">
                <svg viewBox="38 10 24 90" class="bone-svg">
                    <path d="M50 10 C40 10 35 20 40 30 L50 80 L50 100 L60 100 L60 30 C65 20 60 10 50 10 Z" />
                </svg>
            </div>
            <div class="draggable-bone" id="bone-left-lower-leg">
                <svg viewBox="30 100 20 80" class="bone-svg">
                    <path d="M40 100 L50 100 L50 180 L30 180 L30 170 L40 170 Z" />
                </svg>
            </div>
            <div class="draggable-bone" id="bone-right-lower-leg">
                <svg viewBox="50 100 20 80" class="bone-svg">
                    <path d="M50 100 L60 100 L60 170 L70 170 L70 180 L50 180 Z" />
                </svg>
            </div>

            <!-- Victory Modal -->
            <div id="victory-modal" class="modal" style="display: none;">
                <div class="modal-content">
                    <h2>Skeleton Complete!</h2>
                    <p>Time: <span id="final-time">00:00</span></p>
                    <p>Personal Best: <span id="best-time">--:--</span></p>
                    <button id="play-again-btn">Play Again</button>
                </div>
            </div>
        </div>
        <div id="drop-zone">
            <div class="bone-outline" id="outline-skull">
                <svg viewBox="15 5 70 75" class="bone-svg faint-outline">
                    <path fill-rule="evenodd" d="M50 5 C30 5 15 25 15 45 C15 65 25 75 35 80 L65 80 C75 75 85 65 85 45 C85 25 70 5 50 5 Z M30 40 A8 8 0 1 0 30 56 A8 8 0 1 0 30 40 Z M70 40 A8 8 0 1 0 70 56 A8 8 0 1 0 70 40 Z M50 60 L45 70 H55 Z" />
                </svg>
            </div>
            <div class="bone-outline" id="outline-jaw">
                <svg viewBox="35 80 30 19" class="bone-svg faint-outline">
                    <path d="M35 80 C40 85 60 85 65 80 L65 95 C60 100 40 100 35 95 Z" />
                </svg>
            </div>
            <div class="bone-outline" id="outline-left-clavicle">
                <svg viewBox="5 2 40 9" class="bone-svg faint-outline">
                    <path d="M45 10 C30 5 15 15 5 10 C15 5 30 0 45 5 Z" />
                </svg>
            </div>
            <div class="bone-outline" id="outline-right-clavicle">
                <svg viewBox="55 2 40 9" class="bone-svg faint-outline">
                    <path d="M55 10 C70 5 85 15 95 10 C85 5 70 0 55 5 Z" />
                </svg>
            </div>
            <div class="bone-outline" id="outline-ribcage">
                <svg viewBox="24 10 52 90" class="bone-svg faint-outline">
                    <path d="M45 10 H55 V100 H45 Z M45 20 C20 15 15 35 45 40 V35 C20 30 25 20 45 25 Z M55 20 C80 15 85 35 55 40 V35 C80 30 75 20 55 25 Z M45 45 C20 40 15 60 45 65 V60 C20 55 25 45 45 50 Z M55 45 C80 40 85 60 55 65 V60 C80 55 75 45 55 50 Z M45 70 C20 65 15 85 45 90 V85 C20 80 25 70 45 75 Z M55 70 C80 65 85 85 55 90 V85 C80 80 75 70 55 75 Z" />
                </svg>
            </div>
            <div class="bone-outline" id="outline-pelvis">
                <svg viewBox="6 10 87 65" class="bone-svg faint-outline">
                    <path fill-rule="evenodd" d="M10 10 Q50 30 90 10 Q100 40 80 55 L65 75 L50 60 L35 75 L20 55 Q0 40 10 10 Z M25 45 A5 5 0 1 0 25 55 A5 5 0 1 0 25 45 Z M75 45 A5 5 0 1 0 75 55 A5 5 0 1 0 75 45 Z" />
                </svg>
            </div>
            <div class="bone-outline" id="outline-left-arm">
                <svg viewBox="40 10 30 90" class="bone-svg faint-outline">
                    <path d="M60 10 C70 10 75 20 65 30 L50 60 L50 100 L40 100 L40 60 L55 30 C45 20 50 10 60 10 Z" />
                </svg>
            </div>
            <div class="bone-outline" id="outline-right-arm">
                <svg viewBox="29.5 10 30.5 90" class="bone-svg faint-outline">
                    <path d="M40 10 C30 10 25 20 35 30 L50 60 L50 100 L60 100 L60 60 L45 30 C55 20 50 10 40 10 Z" />
                </svg>
            </div>
            <div class="bone-outline" id="outline-left-thigh">
                <svg viewBox="38 10 24 90" class="bone-svg faint-outline">
                    <path d="M50 10 C60 10 65 20 60 30 L50 80 L50 100 L40 100 L40 30 C35 20 40 10 50 10 Z" />
                </svg>
            </div>
            <div class="bone-outline" id="outline-right-thigh">
                <svg viewBox="38 10 24 90" class="bone-svg faint-outline">
                    <path d="M50 10 C40 10 35 20 40 30 L50 80 L50 100 L60 100 L60 30 C65 20 60 10 50 10 Z" />
                </svg>
            </div>
            <div class="bone-outline" id="outline-left-lower-leg">
                <svg viewBox="30 100 20 80" class="bone-svg faint-outline">
                    <path d="M40 100 L50 100 L50 180 L30 180 L30 170 L40 170 Z" />
                </svg>
            </div>
            <div class="bone-outline" id="outline-right-lower-leg">
                <svg viewBox="50 100 20 80" class="bone-svg faint-outline">
                    <path d="M50 100 L60 100 L60 170 L70 170 L70 180 L50 180 Z" />
                </svg>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
